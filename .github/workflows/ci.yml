name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}

jobs:
  lint-typecheck-build:
    name: Lint · Typecheck · Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm turbo run lint --cache-dir=.turbo

      - name: Typecheck
        run: pnpm turbo run typecheck --cache-dir=.turbo

      - name: Build
        run: pnpm turbo run build --cache-dir=.turbo
        env:
          PUBLIC_SITE_URL: https://waimia.com
          PUBLIC_CAL_USERNAME: waimia
          PUBLIC_CAL_EVENT_TYPE: 45min

  e2e:
    name: E2E Playwright (waimia-web)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: lint-typecheck-build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter waimia-web exec playwright install --with-deps chromium

      - name: Run E2E tests
        run: pnpm --filter waimia-web test:e2e
        env:
          PUBLIC_SITE_URL: http://localhost:4321
          PUBLIC_CAL_USERNAME: waimia
          PUBLIC_CAL_EVENT_TYPE: 45min

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 14
